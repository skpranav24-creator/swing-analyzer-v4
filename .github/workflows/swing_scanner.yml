name: Swing Analyzer Auto Scanner

on:
  schedule:
    # Every 15 minutes during NSE market hours, Monday-Friday (UTC times)
    - cron: "45 3 * * 1-5"
    - cron: "0,15,30,45 4-9 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_scanner.py

      - name: Save signal state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signal_state.json
          git diff --cached --quiet || git commit -m "Update signal state"
          git push
